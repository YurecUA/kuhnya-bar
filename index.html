<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A3021">
<title>Кухня та бар — Замовлення</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Source+Serif+Pro:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent:      #1A3021;
  --accent-dim:  #2a4632;
  --accent-soft: #5F6F64;
  --cream:       #FCF9F1;
  --white:       #FFFFFF;
  --text:        #000000;
  --text-dim:    #595959;
  --text-mute:   #707070;
  --border:      rgba(95,111,100,0.25);
  --shadow:      rgba(26,48,33,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  background: var(--cream);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.wrap {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
}
.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  text-align: center;
}
.brand-mark {
  width: 96px;
  height: 96px;
  color: var(--accent);
}
.brand-mark svg { width: 100%; height: 100%; display: block; }
.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 600;
  font-style: italic;
  color: var(--accent);
  letter-spacing: 0.01em;
}
.brand-sub {
  font-family: 'Source Serif Pro', serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-mute);
}
.terminals {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.terminal-link {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  text-decoration: none;
  color: var(--text);
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  box-shadow: 0 1px 3px var(--shadow);
}
.terminal-link:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px var(--shadow);
  border-color: var(--accent-soft);
}
.terminal-link:active {
  transform: translateY(0);
}
.terminal-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--accent);
  color: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  flex-shrink: 0;
}
.terminal-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.terminal-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}
.terminal-meta {
  font-family: 'Source Serif Pro', serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-mute);
}
.terminal-arrow {
  font-size: 18px;
  color: var(--accent-soft);
}
footer {
  font-size: 11px;
  color: var(--text-mute);
  text-align: center;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 110 100" xmlns="http://www.w3.org/2000/svg" aria-label="Кухня та бар">
            <rect x="3" y="4" width="104" height="3" fill="currentColor"/>
            <rect x="3" y="93" width="104" height="2.5" fill="currentColor"/>
            <text x="20" y="78" font-family="'Playfair Display', serif" font-size="74" font-weight="700" fill="currentColor" text-anchor="middle">К</text>
            <g transform="translate(110, 0) scale(-1, 1)">
              <text x="20" y="78" font-family="'Playfair Display', serif" font-size="74" font-weight="700" fill="currentColor" text-anchor="middle">К</text>
            </g>
            <g fill="currentColor">
              <rect x="53" y="22" width="4" height="13"/>
              <path d="M 47 35 Q 47 32 50 32 L 60 32 Q 63 32 63 35 L 63 89 L 47 89 Z"/>
            </g>
          </svg>
    </div>
    <div>
      <div class="brand-name">Кухня &amp; бар</div>
      <div class="brand-sub">Замовлення · Demo</div>
    </div>
  </div>

  <div class="terminals">
    <a href="bar" class="terminal-link">
      <div class="terminal-icon">Б</div>
      <div class="terminal-info">
        <div class="terminal-title">Бар</div>
        <div class="terminal-meta">Bar terminal</div>
      </div>
      <div class="terminal-arrow">→</div>
    </a>
    <a href="restaurant" class="terminal-link">
      <div class="terminal-icon">Р</div>
      <div class="terminal-info">
        <div class="terminal-title">Ресторан</div>
        <div class="terminal-meta">Restaurant terminal</div>
      </div>
      <div class="terminal-arrow">→</div>
    </a>
  </div>

  <footer>SmartOrder · Hackathon Demo · 18.05</footer>

</div>
</body>
</html>
